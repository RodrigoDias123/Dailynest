<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notepad — DailyNest</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- Mobile sidebar toggle -->
<button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle sidebar">
  <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="3" y1="6"  x2="21" y2="6"/>
    <line x1="3" y1="12" x2="21" y2="12"/>
    <line x1="3" y1="18" x2="21" y2="18"/>
  </svg>
</button>

<div class="app-layout">

  <!-- ========== SIDEBAR ========== -->
  <aside class="sidebar" id="sidebar">

    <div class="sidebar-logo">
      <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span class="logo-text"><span class="bold">Daily</span><span class="light">nest</span></span>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Workspace</div>
      <div class="workspace-toggle">
        <button class="pill active" onclick="toggleWorkspace(this)">Work</button>
        <button class="pill" onclick="toggleWorkspace(this)">Personal</button>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Navigation</div>
      <nav class="sidebar-nav">

        <a href="tasks.html" class="nav-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
            <rect x="9" y="3" width="6" height="4" rx="1"/>
            <path d="M9 12l2 2 4-4"/>
          </svg>
          Tasks
        </a>

        <a href="agenda.html" class="nav-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8"  y1="2" x2="8"  y2="6"/>
            <line x1="3"  y1="10" x2="21" y2="10"/>
          </svg>
          Agenda
        </a>

        <a href="notepad.html" class="nav-link active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
          Notepad
        </a>

        <a href="#" class="nav-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
          </svg>
          Files
        </a>

      </nav>
    </div>

    <div class="sidebar-footer">
      <div class="avatar-circle">RD</div>
      <div>
        <div class="sidebar-user-name">Rodrigo Dias</div>
        <div class="sidebar-user-email">rodrigoDias@gmail.com</div>
      </div>
    </div>

  </aside>
  <!-- /SIDEBAR -->

  <!-- ========== MAIN CONTENT ========== -->
  <main class="main-content">

    <!-- Page header -->
    <div class="page-header">
      <div>
        <h1>Notepad</h1>
        <div class="notepad-meta-row">
          <span>
            <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle; margin-right:4px;">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
            Not saved yet
          </span>
          <span id="saveStatus">
            <span class="unsaved-dot"></span> Unsaved changes
          </span>
        </div>
      </div>
      <div class="page-header-actions">
        <button class="btn btn-ghost" id="clearNoteBtn">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
            <path d="M10 11v6M14 11v6"/>
            <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
          </svg>
          Clear
        </button>
        <button class="btn btn-primary" id="saveNoteBtn">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
            <polyline points="17 21 17 13 7 13 7 21"/>
            <polyline points="7 3 7 8 15 8"/>
          </svg>
          Save Note
        </button>
      </div>
    </div>

    <!-- Stats bar -->
    <div class="notepad-stats">
      <span>
        <strong>T</strong>&nbsp;
        <span id="wordCount">0</span> words
      </span>
      <span>
        <strong>≡</strong>&nbsp;
        <span id="charCount">0</span> characters
      </span>
      <span>
        <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>&nbsp;
        <span id="readTime">0</span> min read
      </span>
    </div>

    <!-- Editor -->
    <div class="notepad-editor">
      <input
        type="text"
        class="note-title-input"
        id="noteTitle"
        placeholder="Untitled Note"
        autocomplete="off"
      />
      <hr class="note-divider" />
      <textarea
        class="note-body-input"
        id="noteBody"
        placeholder="Start writing your thoughts..."
      ></textarea>
    </div>

  </main>
  <!-- /MAIN CONTENT -->

</div>

<script src="app.js"></script>
</body>
</html>
