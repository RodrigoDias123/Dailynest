<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agenda — DailyNest</title>
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/modules/agenda.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <script src="js/components/sidebar.js"></script>
</head>
<body>

<app-mobile-topbar></app-mobile-topbar>

<div class="app-layout">

  <app-sidebar></app-sidebar>

  <!-- ========== MAIN CONTENT ========== -->
  <main class="main-content">

    <!-- Toolbar -->
    <div class="agenda-toolbar">
      <div class="agenda-toolbar-left">
        <button class="nav-arrow" onclick="prevPeriod()" aria-label="Previous period">&#8249;</button>
        <h1>Agenda</h1>
        <button class="nav-arrow" onclick="nextPeriod()" aria-label="Next period">&#8250;</button>
        <span class="agenda-date-range">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8"  y1="2" x2="8"  y2="6"/>
            <line x1="3"  y1="10" x2="21" y2="10"/>
          </svg>
          <span id="agenda-date-range-text"></span>
        </span>
      </div>
      <div style="display:flex; align-items:center; gap:12px;">
        <div class="view-toggle">
          <button onclick="setView(this)">Day</button>
          <button class="active" id="btn-week" onclick="setView(this)">Week</button>
          <button onclick="setView(this)">Month</button>
        </div>
        <button class="btn btn-primary" onclick="openEventModal('create')">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          New Event
        </button>
      </div>
    </div>

    <!-- Calendar + Mini calendar -->
    <div class="agenda-layout">

      <!-- Weekly calendar / Month view -->
      <div class="calendar-wrap">

        <!-- ── WEEK VIEW ── -->
        <div id="week-view">
          <div class="week-scroll-container">

            <!-- Week header: days (sticky) -->
            <div class="week-header" id="week-header"></div>

            <!-- Week grid: time rows -->
            <div class="week-grid" id="week-grid"></div>

          </div>
        </div>
        <!-- /week-view -->

        <!-- ── DAY VIEW ── -->
        <div id="day-view" style="display:none;">
          <div class="day-view-header">
            <div class="day-view-title" id="day-view-title"></div>
          </div>
          <div id="day-view-list" class="day-view-list"></div>
        </div>
        <!-- /day-view -->

        <!-- ── MONTH VIEW ── -->
        <div id="month-view" style="display:none;">
          <div class="month-nav">
            <button class="nav-arrow" onclick="prevMonth()" aria-label="Previous month">&#8249;</button>
            <span id="month-nav-title" class="month-nav-title"></span>
            <button class="nav-arrow" onclick="nextMonth()" aria-label="Next month">&#8250;</button>
          </div>
          <div class="month-weekdays">
            <div>Mon</div><div>Tue</div><div>Wed</div>
            <div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div>
          </div>
          <div id="month-grid-body" class="month-grid-body"></div>
        </div>
        <!-- /month-view -->

      </div>
      <!-- /calendar-wrap -->

      <!-- Right sidebar: mini calendar + upcoming -->
      <div class="mini-calendar">

        <!-- Day events panel (shown in month view) -->
        <div id="day-events-panel" class="mini-cal-card" style="display:none;">
          <div class="day-events-title">Select a day</div>
          <div class="day-events-list">
            <p class="no-events-msg">Click on a day to see its events.</p>
          </div>
        </div>

        <!-- Mini month calendar -->
        <div id="mini-cal-card" class="mini-cal-card">
          <div class="mini-cal-header">
            <span class="mini-cal-title" id="mini-cal-title"></span>
            <div style="display:flex; gap:4px;">
              <button class="nav-arrow" style="width:26px;height:26px;font-size:0.8rem;" onclick="miniCalPrev()" aria-label="Prev month">&#8249;</button>
              <button class="nav-arrow" style="width:26px;height:26px;font-size:0.8rem;" onclick="miniCalNext()" aria-label="Next month">&#8250;</button>
            </div>
          </div>
          <div class="mini-cal-grid" id="mini-cal-grid"></div>
        </div>

        <!-- Upcoming events -->
        <div id="upcoming-panel" class="mini-cal-card upcoming-section">
          <div class="section-label">Upcoming</div>
          <div id="upcoming-list"></div>
        </div>

      </div>
      <!-- /mini-calendar -->

    </div>
    <!-- /agenda-layout -->

  </main>
  <!-- /MAIN CONTENT -->

</div>

<!-- ========== MODAL: Create New Event ========== -->
<div class="modal-overlay" id="createEventModal" role="dialog" aria-modal="true" aria-labelledby="eventModalTitle">
  <div class="modal">

    <div class="modal-header">
      <h2 class="modal-title" id="eventModalTitle">New Event</h2>
      <button class="modal-close" onclick="closeModal('createEvent')" aria-label="Close">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <form id="eventForm" onsubmit="submitEventForm(event)">
      <div class="form-group">
        <label class="form-label" for="eventTitle">Title</label>
        <input type="text" id="eventTitle" class="form-input" placeholder="Enter event title..." required />
      </div>
      <div class="form-group">
        <label class="form-label" for="eventDescription">Description</label>
        <textarea id="eventDescription" class="form-input form-textarea" placeholder="Optional description..." rows="3"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label" for="eventStartDate">Date</label>
        <input type="date" id="eventStartDate" class="form-input" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="eventStartTime">Time</label>
        <input type="time" id="eventStartTime" class="form-input" required />
      </div>
      <input type="hidden" id="eventEndDate" value="" />
      <input type="hidden" id="editingEventId" value="" />
      <div class="modal-actions">
        <button type="button" class="btn btn-danger btn-sm" id="deleteEventBtn" onclick="deleteEvent()" style="display:none; margin-right:auto;">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
            <path d="M10 11v6M14 11v6"/>
          </svg>
          Delete
        </button>
        <button type="button" class="btn btn-ghost" onclick="closeEventModal()">Cancel</button>
        <button type="submit" class="btn btn-primary" id="eventSubmitBtn">Create Event</button>
      </div>
    </form>

  </div>
</div>
<!-- /MODAL -->

<script src="js/toast.js"></script>
<script src="js/api.js"></script>
<script src="js/router.js"></script>
<script src="js/auth.js"></script>
<script src="js/modules/agenda.js"></script>
<script type="module" src="js/animations.js"></script>
</body>
</html>
