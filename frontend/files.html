<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Files — DailyNest</title>
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/modules/files.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <script src="js/components/sidebar.js"></script>
</head>
<body>

<app-mobile-topbar></app-mobile-topbar>

<div class="app-layout">

  <app-sidebar></app-sidebar>

  <!-- ========== MAIN CONTENT ========== -->
  <main class="main-content files-main">

    <!-- Page header -->
    <div class="page-header">
      <div>
        <h1>Files</h1>
        <p class="subtitle">Your cloud storage</p>
        <div class="storage-bar-wrap">
          <div class="storage-bar-track">
            <div class="storage-bar-fill" id="storageBarFill" style="width:0%"></div>
          </div>
          <span class="storage-label" id="storageLabel">0 B used of 10 GB</span>
        </div>
      </div>
      <div class="page-header-actions">
        <button class="btn btn-primary" onclick="openUploadModal()">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 16 12 12 8 16"/>
            <line x1="12" y1="12" x2="12" y2="21"/>
            <path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/>
          </svg>
          Upload
        </button>
      </div>
    </div>

    <!-- Files body: list + new panel -->
    <div class="files-body">

      <!-- LEFT: File list area -->
      <div class="files-content">

        <!-- Toolbar: search + view toggle -->
        <div class="files-toolbar">
          <div class="files-search-wrap">
            <svg class="files-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input
              type="text"
              class="files-search-input"
              id="searchInput"
              placeholder="Search files..."
              oninput="filterFiles()"
            />
          </div>
          <div class="view-toggle">
            <button class="view-btn active" id="listViewBtn" onclick="setView('list')" title="List view">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="8" y1="6" x2="21" y2="6"/>
                <line x1="8" y1="12" x2="21" y2="12"/>
                <line x1="8" y1="18" x2="21" y2="18"/>
                <line x1="3" y1="6" x2="3.01" y2="6"/>
                <line x1="3" y1="12" x2="3.01" y2="12"/>
                <line x1="3" y1="18" x2="3.01" y2="18"/>
              </svg>
            </button>
            <button class="view-btn" id="gridViewBtn" onclick="setView('grid')" title="Grid view">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="7" height="7"/>
                <rect x="14" y="3" width="7" height="7"/>
                <rect x="14" y="14" width="7" height="7"/>
                <rect x="3" y="14" width="7" height="7"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Breadcrumb -->
        <div class="files-breadcrumb">
          <a href="#" class="breadcrumb-item" onclick="navigateTo('root')">All Files</a>
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
          <span class="breadcrumb-item active" id="breadcrumbCurrent">My Files</span>
        </div>

        <!-- File list (list view) -->
        <div class="files-table-wrap" id="listView">
          <table class="files-table">
            <thead>
              <tr>
                <th class="col-name">Name</th>
                <th class="col-modified">Modified</th>
                <th class="col-size">Size</th>
                <th class="col-actions"></th>
              </tr>
            </thead>
            <tbody id="fileTableBody">
              <!-- populated by JS -->
            </tbody>
          </table>
          <div class="files-empty" id="filesEmpty" style="display:none;">
            <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
            </svg>
            <p>No files found</p>
          </div>
        </div>

        <!-- Grid view -->
        <div class="files-grid" id="gridView" style="display:none;">
          <!-- populated by JS -->
        </div>

      </div>
      <!-- /LEFT -->


    </div>
    <!-- /files-body -->

  </main>
  <!-- /MAIN CONTENT -->

</div>

<!-- ========== UPLOAD MODAL ========== -->
<div class="modal-overlay" id="uploadModal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">Upload File</h2>
      <button class="modal-close" onclick="closeModal('upload')" aria-label="Close">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="form-group">
      <div class="upload-dropzone" id="dropzone" onclick="document.getElementById('fileInput').click()" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
        <input type="file" id="fileInput" style="display:none" onchange="onFileSelected(event)" />
        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 16 12 12 8 16"/>
          <line x1="12" y1="12" x2="12" y2="21"/>
          <path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/>
        </svg>
        <span class="dropzone-text" id="dropzoneText">Click to upload or drag & drop</span>
        <span class="dropzone-hint">Max 1 GB per file</span>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">File Name</label>
      <input type="text" class="form-input" id="uploadFileName" placeholder="Enter file name..." />
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('upload')">Cancel</button>
      <button class="btn btn-primary" onclick="uploadFile()">Upload File</button>
    </div>
  </div>
</div>

<!-- ========== FILE ACTIONS MENU ========== -->
<div class="file-actions-menu" id="actionsMenu" style="display:none;">
  <button class="file-actions-item" onclick="renameFile()">
    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
      <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
    </svg>
    Rename
  </button>
  <button class="file-actions-item" onclick="downloadFile()">
    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    Download
  </button>
  <div class="file-actions-sep"></div>
  <button class="file-actions-item danger" onclick="deleteFile()">
    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="3 6 5 6 21 6"/>
      <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
      <path d="M10 11v6M14 11v6"/>
      <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
    </svg>
    Delete
  </button>
</div>

<script src="js/toast.js"></script>
<script src="js/api.js"></script>
<script src="js/router.js"></script>
<script src="js/auth.js"></script>
<script src="js/modules/files.js"></script>
<script type="module" src="js/animations.js"></script>
</body>
</html>
